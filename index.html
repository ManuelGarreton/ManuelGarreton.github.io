<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomía de la Bicicleta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body { font-family: 'DM Sans', sans-serif; }

/* ── TAB BAR ── */
.tabs-bar {
  display: flex;
  gap: 0;
  background: #EEEAE0;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  padding: 0 1.5rem;
}
.tab-btn {
  padding: 0.6rem 1.25rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8125rem;
  color: #999;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  margin-bottom: -1px;
  transition: color 0.2s, border-color 0.2s;
}
.tab-btn.active { color: #1A1A18; border-bottom-color: #1A1A18; }

/* ── HEADER ── */
#main-header {
  padding: 1.125rem 1.5rem 1rem;
  background: #fff;
  border-bottom: 0.5px solid rgba(0,0,0,0.10);
}
#main-header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(1.4rem, 3.5vw, 2rem);
  font-weight: 400;
  letter-spacing: -0.02em;
  color: #1A1A18;
}

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }
#view-3.active { display: flex; flex-direction: column; }

/* ── SVG PARTS (shared) ── */
.part { cursor: pointer; transition: opacity 0.18s ease; }
.part:hover { opacity: 0.7; }

/* ═══════════════════════════════
   OPTION 1 — Side panel
═══════════════════════════════ */
#view-1 {
  background: #F5F2EC;
  min-height: calc(100dvh - 100px);
  padding: 1rem 1.25rem 1.5rem;
}
.layout-split { display: flex; gap: 1rem; align-items: flex-start; flex-wrap: wrap; }
.svg-col { flex: 3; min-width: 280px; }
.panel-col { flex: 1.3; min-width: 200px; max-width: 258px; }

.info-panel {
  background: #fff;
  border: 0.5px solid rgba(0,0,0,0.10);
  border-radius: 14px;
  overflow: hidden;
}
.panel-empty-msg {
  padding: 2.5rem 1.25rem;
  text-align: center;
  font-size: 0.8125rem;
  color: #9A9A94;
  line-height: 1.6;
}
.panel-data { display: none; }
.panel-header-box { padding: 1.25rem 1.25rem 1rem; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
.part-badge {
  display: inline-block;
  font-size: 0.625rem;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
  margin-bottom: 8px;
  font-weight: 500;
}
.pname { font-family: 'DM Serif Display', serif; font-size: 1.5rem; font-weight: 400; letter-spacing: -0.01em; margin-bottom: 2px; color: #1A1A18; }
.pen { font-size: 0.75rem; color: #9A9A94; font-style: italic; }
.panel-body { padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.875rem; }
.flbl { font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.08em; color: #9A9A94; margin-bottom: 3px; }
.fval { font-size: 0.8125rem; color: #1A1A18; line-height: 1.55; }
.fact-box { margin: 0 1.25rem 1.25rem; background: #F5F2EC; border-radius: 8px; padding: 0.75rem 0.875rem; }
.fact-box .fval { font-size: 0.75rem; color: #5A5A56; }

/* ═══════════════════════════════
   OPTION 2 — Full width + overlay
═══════════════════════════════ */
#view-2 { background: #F5F2EC; padding: 1rem 1.25rem 1.5rem; }
.svg-full { border: 0.5px solid rgba(0,0,0,0.10); border-radius: 14px; background: #FAFAF7; overflow: hidden; display: block; width: 100%; }

#v2-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(240,237,231,0.62);
  backdrop-filter: blur(3px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#v2-overlay.open { display: flex; }
#v2-card {
  background: #fff;
  border: 0.5px solid rgba(0,0,0,0.12);
  border-radius: 18px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.14);
  width: min(400px, 90vw);
  position: relative;
  animation: cardIn 0.22s ease;
}
@keyframes cardIn {
  from { opacity: 0; transform: scale(0.94) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.ov-inner { padding: 1.5rem; }
.ov-close {
  position: absolute; top: 1rem; right: 1rem;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(0,0,0,0.07); border: none; cursor: pointer;
  font-size: 17px; color: #5A5A56;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.ov-close:hover { background: rgba(0,0,0,0.13); }
.ov-name { font-family: 'DM Serif Display', serif; font-size: 1.75rem; font-weight: 400; margin: 0.5rem 0 0.25rem; color: #1A1A18; letter-spacing: -0.01em; }
.ov-en { font-size: 0.75rem; color: #9A9A94; font-style: italic; margin-bottom: 1.25rem; }
.ov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.ov-fact { background: #F5F2EC; border-radius: 8px; padding: 0.75rem 0.875rem; }
.ov-fact .fval { font-size: 0.75rem; color: #5A5A56; }

/* ═══════════════════════════════
   OPTION 3 — Full width + bottom drawer
═══════════════════════════════ */
#view-3 {
  background: #F5F2EC;
  min-height: calc(100dvh - 100px);
}
.light-svg-area {
  flex: 1;
  padding: 1rem 1.25rem 1rem;
  display: flex;
  align-items: center;
}
#svg3 {
  width: 100%;
  border: 0.5px solid rgba(0,0,0,0.10);
  border-radius: 14px;
  background: #FAFAF7;
  cursor: pointer;
  display: block;
}

#v3-drawer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 0.5px solid rgba(0,0,0,0.10);
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.10);
  transform: translateY(110%);
  transition: transform 0.33s cubic-bezier(0.32, 0, 0.16, 1);
  z-index: 200;
}
#v3-drawer.open { transform: translateY(0); }
.drawer-handle { width: 36px; height: 4px; background: rgba(0,0,0,0.12); border-radius: 2px; margin: 12px auto 0; }
.drawer-close {
  position: absolute; top: 1rem; right: 1rem;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(0,0,0,0.07); border: none;
  cursor: pointer; font-size: 18px; color: #5A5A56;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.drawer-close:hover { background: rgba(0,0,0,0.13); }
.drawer-body { padding: 1.25rem 1.5rem 2.25rem; display: flex; gap: 1.5rem; flex-wrap: wrap; }
.dr-main { min-width: 160px; }
.dr-name { font-family: 'DM Serif Display', serif; font-size: 1.75rem; font-weight: 400; color: #1A1A18; letter-spacing: -0.01em; margin-bottom: 3px; }
.dr-en { font-size: 0.75rem; color: #9A9A94; font-style: italic; }
.dr-cols { display: flex; gap: 1rem; flex: 2; min-width: 220px; flex-wrap: wrap; }
.dr-field { flex: 1; min-width: 140px; }
.dr-lbl { font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.08em; color: #9A9A94; margin-bottom: 4px; }
.dr-val { font-size: 0.8125rem; color: #1A1A18; line-height: 1.55; }
.dr-fact { background: #F5F2EC; border-radius: 8px; padding: 0.75rem 0.875rem; flex: 1; min-width: 180px; }
.dr-fact .dr-val { font-size: 0.75rem; color: #5A5A56; }

@media (max-width: 600px) {
  .layout-split { flex-direction: column; }
  .panel-col { max-width: 100%; width: 100%; }
  .ov-grid { grid-template-columns: 1fr; }
  .dark-svg-area { padding: 0.75rem; }
}
</style>
</head>
<body>

<!-- TAB BAR -->
<nav class="tabs-bar">
  <button class="tab-btn active" data-v="1">Opción 1</button>
  <button class="tab-btn" data-v="2">Opción 2</button>
  <button class="tab-btn" data-v="3">Opción 3</button>
</nav>

<!-- HEADER -->
<header id="main-header">
  <h1>Anatomía de la Bicicleta</h1>
</header>

<!-- ══════════ VIEW 1 ══════════ -->
<div id="view-1" class="view active">
  <div class="layout-split">
    <div class="svg-col">
      <svg id="svg1" viewBox="0 0 620 505" xmlns="http://www.w3.org/2000/svg"
        style="width:100%;border:0.5px solid rgba(0,0,0,0.10);border-radius:14px;background:#FAFAF7;cursor:pointer;display:block"></svg>
    </div>
    <div class="panel-col">
      <div class="info-panel">
        <p class="panel-empty-msg" id="v1-empty">Selecciona una pieza de la bicicleta</p>
        <div class="panel-data" id="v1-data">
          <div class="panel-header-box">
            <span class="part-badge" id="v1-badge"></span>
            <p class="pname" id="v1-name"></p>
            <p class="pen" id="v1-en"></p>
          </div>
          <div class="panel-body">
            <div><p class="flbl">Función</p><p class="fval" id="v1-fn"></p></div>
            <div><p class="flbl">Material</p><p class="fval" id="v1-mat"></p></div>
          </div>
          <div class="fact-box">
            <p class="flbl">Dato curioso</p>
            <p class="fval" id="v1-fact"></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ VIEW 2 ══════════ -->
<div id="view-2" class="view" style="background:#F5F2EC;padding:1rem 1.25rem 1.5rem">
  <svg id="svg2" viewBox="0 0 620 505" xmlns="http://www.w3.org/2000/svg" class="svg-full"></svg>
</div>

<!-- Overlay card for view 2 (fixed, outside view div) -->
<div id="v2-overlay">
  <div id="v2-card">
    <div class="ov-inner">
      <button class="ov-close" id="v2-close">×</button>
      <span class="part-badge" id="v2-badge"></span>
      <p class="ov-name" id="v2-name"></p>
      <p class="ov-en" id="v2-en"></p>
      <div class="ov-grid">
        <div><p class="flbl">Función</p><p class="fval" id="v2-fn"></p></div>
        <div><p class="flbl">Material</p><p class="fval" id="v2-mat"></p></div>
      </div>
      <div class="ov-fact">
        <p class="flbl">Dato curioso</p>
        <p class="fval" id="v2-fact"></p>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ VIEW 3 ══════════ -->
<div id="view-3" class="view">
  <div class="light-svg-area">
    <svg id="svg3" viewBox="0 0 620 505" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="v3-drawer">
    <div class="drawer-handle"></div>
    <button class="drawer-close" id="v3-close">×</button>
    <div class="drawer-body">
      <div class="dr-main">
        <span class="part-badge" id="v3-badge"></span>
        <p class="dr-name" id="v3-name"></p>
        <p class="dr-en" id="v3-en"></p>
      </div>
      <div class="dr-cols">
        <div class="dr-field">
          <p class="dr-lbl">Función</p>
          <p class="dr-val" id="v3-fn"></p>
        </div>
        <div class="dr-field">
          <p class="dr-lbl">Material</p>
          <p class="dr-val" id="v3-mat"></p>
        </div>
        <div class="dr-fact">
          <p class="dr-lbl">Dato curioso</p>
          <p class="dr-val" id="v3-fact"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── DATA ── */
const PARTS = {
  cuadro:     { name:'Cuadro',           en:'Frame',            num:'01', c:'#185FA5', bg:'#E6F1FB', tc:'#0C447C', fn:'Estructura central que une todos los componentes. Transmite fuerzas entre el ciclista, las ruedas y el terreno.', mat:'Acero, aluminio, fibra de carbono o titanio', fact:'El diseño de cuadro diamante lleva más de 130 años casi sin cambios — una de las estructuras más eficientes jamás creadas.' },
  horquilla:  { name:'Horquilla',        en:'Front Fork',       num:'02', c:'#5F5E5A', bg:'#F1EFE8', tc:'#2C2C2A', fn:'Sostiene la rueda delantera y permite la dirección. Puede incluir suspensión para absorber impactos.', mat:'Acero cromado, aluminio o fibra de carbono', fact:'Las horquillas de suspensión para montaña pueden tener hasta 200mm de recorrido para absorber impactos extremos.' },
  'rueda-del':{ name:'Rueda delantera',  en:'Front Wheel',      num:'03', c:'#5F5E5A', bg:'#F1EFE8', tc:'#2C2C2A', fn:'Proporciona tracción y dirección. Convierte el movimiento rotatorio en desplazamiento hacia adelante.', mat:'Llanta de aluminio o carbono, rayos de acero inox, neumático de caucho', fact:'Una rueda bien tensada puede soportar más de 100 veces su propio peso sin deformarse.' },
  'rueda-tra':{ name:'Rueda trasera',    en:'Rear Wheel',       num:'04', c:'#5F5E5A', bg:'#F1EFE8', tc:'#2C2C2A', fn:'Recibe la fuerza de la cadena y propulsa la bicicleta. Soporta la mayor parte del peso del ciclista.', mat:'Llanta de aluminio o carbono, rayos de acero inox, neumático de caucho', fact:'La rueda trasera soporta ~60% del peso total, por eso sus rayos son más cortos y tensos.' },
  manubrio:   { name:'Manubrio',         en:'Handlebars',       num:'05', c:'#0F6E56', bg:'#E1F5EE', tc:'#085041', fn:'Permite controlar la dirección y sirve de apoyo para las manos. Su forma varía según la disciplina.', mat:'Aluminio 6061 o fibra de carbono', fact:'Los manubrios de triatlón (tipo cuerno) pueden reducir la resistencia aerodinámica hasta un 30%.' },
  potencia:   { name:'Potencia',         en:'Stem',             num:'06', c:'#888780', bg:'#F1EFE8', tc:'#2C2C2A', fn:'Conecta el manubrio al tubo de dirección. Su longitud y ángulo definen la postura de conducción.', mat:'Aluminio forjado o fibra de carbono', fact:'Cambiar la potencia por una 1cm más corta puede transformar completamente la sensación al conducir.' },
  sillin:     { name:'Sillín',           en:'Saddle',           num:'07', c:'#0F6E56', bg:'#E1F5EE', tc:'#085041', fn:'Soporte para sentarse. Distribuye el peso y evita presión excesiva en zonas sensibles.', mat:'Cubierta de cuero sintético, núcleo plástico, raíles de titanio o acero', fact:'El sillín incorrecto es la causa #1 de molestias en ciclismo. El correcto puede requerir varias pruebas.' },
  tija:       { name:'Tija de sillín',   en:'Seat Post',        num:'08', c:'#888780', bg:'#F1EFE8', tc:'#2C2C2A', fn:'Tubo que conecta el sillín al cuadro y permite regular la altura del asiento.', mat:'Aluminio, fibra de carbono o acero', fact:'La altura correcta del sillín mejora la eficiencia del pedaleo hasta un 10% y previene lesiones de rodilla.' },
  bielas:     { name:'Bielas',           en:'Cranks',           num:'09', c:'#BA7517', bg:'#FAEEDA', tc:'#633806', fn:'Brazos que convierten la fuerza de las piernas en rotación para mover la cadena.', mat:'Aluminio forjado, fibra de carbono o acero', fact:'Solo 2.5mm de diferencia en la longitud cambia notablemente la biomecánica del pedaleo.' },
  plato:      { name:'Plato',            en:'Chainring',        num:'10', c:'#854F0B', bg:'#FAEEDA', tc:'#412402', fn:'Rueda dentada unida a las bielas que mueve la cadena hacia el cassette trasero.', mat:'Aluminio, acero o carbono con insertos metálicos', fact:'Los platos ovalados reducen el punto muerto del pedaleo, mejorando la eficiencia muscular hasta un 5%.' },
  pedales:    { name:'Pedales',          en:'Pedals',           num:'11', c:'#BA7517', bg:'#FAEEDA', tc:'#633806', fn:'Punto de contacto del pie. Transmiten la fuerza de las piernas hacia las bielas.', mat:'Plástico reforzado o aluminio con pines de acero', fact:'Los pedales automáticos permiten aplicar fuerza en 360° del pedaleo, mejorando la eficiencia hasta un 20%.' },
  cadena:     { name:'Cadena',           en:'Chain',            num:'12', c:'#5F5E5A', bg:'#F1EFE8', tc:'#2C2C2A', fn:'Transmite la potencia del plato al cassette para impulsar la rueda trasera.', mat:'Acero al carbono con placas y pines, a veces recubiertos de níquel o teflón', fact:'Una cadena de bicicleta tiene eficiencia mecánica >98% — una de las más altas en cualquier mecanismo.' },
  cassette:   { name:'Cassette',         en:'Cassette',         num:'13', c:'#854F0B', bg:'#FAEEDA', tc:'#412402', fn:'Conjunto de piñones en la rueda trasera que permite seleccionar distintas relaciones de marcha.', mat:'Acero aleado; piñones pequeños a veces en titanio', fact:'Un cassette de 12 velocidades va de 10 a 52 dientes — antes ese rango requería dos platos.' },
  desviador:  { name:'Desviador trasero',en:'Rear Derailleur',  num:'14', c:'#993C1D', bg:'#FAECE7', tc:'#4A1B0C', fn:'Guía la cadena entre los piñones del cassette para cambiar de marcha.', mat:'Aluminio, titanio y polímero de alta resistencia; resorte de acero', fact:'Los desviadores electrónicos (Shimano Di2, SRAM AXS) cambian de marcha en menos de 60ms.' },
  frenos:     { name:'Sistema de frenos',en:'Brakes',           num:'15', c:'#A32D2D', bg:'#FCEBEB', tc:'#501313', fn:'Desaceleran y detienen la bicicleta aplicando fricción sobre la llanta o un disco metálico.', mat:'Pinza de aluminio, pastillas de goma o carbono, cable de acero o línea hidráulica', fact:'Los frenos de disco hidráulicos generan el doble de potencia de frenado bajo lluvia vs. los de llanta.' },
};

/* ── SVG HELPERS ── */
const NS = 'http://www.w3.org/2000/svg';
function el(tag, a = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(a)) e.setAttribute(k, v);
  return e;
}
function lbl(x, y, text, fill, size = 9, anchor = 'middle') {
  const t = el('text', { x, y, 'text-anchor': anchor, 'font-size': size, fill, 'pointer-events': 'none', 'font-family': 'DM Sans, sans-serif' });
  t.textContent = text;
  return t;
}

/* ── BUILD BIKE SVG ── */
function buildBike(svgEl, onPartClick, darkMode = false) {
  while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);
  const lf = id => darkMode ? 'rgba(255,255,255,0.5)' : PARTS[id].tc;

  function part(id) {
    const g = el('g', { class: 'part', 'data-id': id });
    g.addEventListener('click', e => { e.stopPropagation(); onPartClick(id); });
    g.addEventListener('touchstart', e => { e.preventDefault(); onPartClick(id); }, { passive: false });
    return g;
  }

  // FRAME
  (function () {
    const g = part('cuadro');
    g.append(el('polygon', { points: '222,152 368,170 350,310 222,207', fill: PARTS.cuadro.bg, stroke: 'none', opacity: .5 }));
    g.append(el('polygon', { points: '368,170 432,293 350,310', fill: PARTS.cuadro.bg, stroke: 'none', opacity: .32 }));
    [['M 222,152 L 222,207', 4], ['M 222,155 L 367,172', 4], ['M 222,205 L 350,310', 4],
     ['M 367,172 L 350,310', 4], ['M 350,310 L 432,293', 3.5], ['M 367,172 L 432,293', 3.5]
    ].forEach(([d, w]) => g.append(el('path', { d, fill: 'none', stroke: PARTS.cuadro.c, 'stroke-width': w, 'stroke-linecap': 'round' })));
    g.append(el('rect', { x: 214, y: 147, width: 14, height: 63, rx: 4, fill: PARTS.cuadro.c }));
    g.append(el('circle', { cx: 350, cy: 310, r: 9, fill: PARTS.cuadro.c }));
    g.append(lbl(292, 232, 'Cuadro', lf('cuadro'), 10));
    svgEl.append(g);
  })();

  // FORK
  (function () {
    const g = part('horquilla');
    g.append(el('rect', { x: 139, y: 202, width: 36, height: 11, rx: 3, fill: PARTS.horquilla.c }));
    g.append(el('line', { x1: 157, y1: 155, x2: 157, y2: 203, stroke: PARTS.horquilla.c, 'stroke-width': 4.5, 'stroke-linecap': 'round' }));
    g.append(el('path', { d: 'M 148,213 Q 118,268 112,332', fill: 'none', stroke: PARTS.horquilla.c, 'stroke-width': 3.5, 'stroke-linecap': 'round' }));
    g.append(el('path', { d: 'M 166,213 Q 180,268 172,332', fill: 'none', stroke: PARTS.horquilla.c, 'stroke-width': 3.5, 'stroke-linecap': 'round' }));
    g.append(el('line', { x1: 107, y1: 332, x2: 177, y2: 332, stroke: PARTS.horquilla.c, 'stroke-width': 3, 'stroke-linecap': 'round' }));
    g.append(el('rect', { x: 96, y: 147, width: 88, height: 192, rx: 4, fill: 'transparent', 'pointer-events': 'all' }));
    g.append(lbl(142, 352, 'Horquilla', lf('horquilla')));
    svgEl.append(g);
  })();

  // WHEELS
  function mkWheel(cx, cy, r, id) {
    const g = part(id);
    g.append(el('circle', { cx, cy, r: r - 5, fill: PARTS[id].bg, opacity: .48 }));
    g.append(el('circle', { cx, cy, r, fill: 'none', stroke: PARTS[id].c, 'stroke-width': 8 }));
    g.append(el('circle', { cx, cy, r: r - 12, fill: 'none', stroke: PARTS[id].c, 'stroke-width': 1.5, opacity: .58 }));
    g.append(el('circle', { cx, cy, r: 7, fill: PARTS[id].c }));
    for (let i = 0; i < 12; i++) {
      const a = i * 30 * Math.PI / 180;

/* ── HELPERS ── */
function dim(svgEl, activeId) {
  svgEl.querySelectorAll('.part').forEach(p =>
    p.style.opacity = (!activeId || p.getAttribute('data-id') === activeId) ? '1' : '0.2'
  );
}
function setBadge(el, d) {
  el.textContent = 'Pieza ' + d.num;
  el.style.cssText = `display:inline-block;font-size:.625rem;letter-spacing:.09em;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-bottom:8px;font-weight:500;background:${d.bg};color:${d.tc};border:.5px solid ${d.c}`;
}

/* ── OPTION 1 LOGIC ── */
let sel1 = null;
buildBike(document.getElementById('svg1'), id => {
  if (!id) { sel1 = null; dim(document.getElementById('svg1'), null); document.getElementById('v1-empty').style.display = ''; document.getElementById('v1-data').style.display = 'none'; return; }
  if (id === sel1) return;
  sel1 = id;
  const d = PARTS[id];
  dim(document.getElementById('svg1'), id);
  document.getElementById('v1-empty').style.display = 'none';
  document.getElementById('v1-data').style.display = 'block';
  setBadge(document.getElementById('v1-badge'), d);
  document.getElementById('v1-name').textContent = d.name;
  document.getElementById('v1-en').textContent = d.en;
  document.getElementById('v1-fn').textContent = d.fn;
  document.getElementById('v1-mat').textContent = d.mat;
  document.getElementById('v1-fact').textContent = d.fact;
  if (window.innerWidth < 600) document.querySelector('.panel-col').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});

/* ── OPTION 2 LOGIC ── */
let svg2Built = false;
const v2overlay = document.getElementById('v2-overlay');
const v2card = document.getElementById('v2-card');

function buildOpt2() {
  if (svg2Built) return;
  svg2Built = true;
  buildBike(document.getElementById('svg2'), id => {
    if (!id) { v2overlay.classList.remove('open'); dim(document.getElementById('svg2'), null); return; }
    const d = PARTS[id];
    dim(document.getElementById('svg2'), id);
    setBadge(document.getElementById('v2-badge'), d);
    document.getElementById('v2-name').textContent = d.name;
    document.getElementById('v2-en').textContent = d.en;
    document.getElementById('v2-fn').textContent = d.fn;
    document.getElementById('v2-mat').textContent = d.mat;
    document.getElementById('v2-fact').textContent = d.fact;
    v2overlay.classList.add('open');
  });
}

document.getElementById('v2-close').addEventListener('click', () => {
  v2overlay.classList.remove('open');
  dim(document.getElementById('svg2'), null);
});
v2overlay.addEventListener('click', e => {
  if (!e.target.closest('#v2-card')) { v2overlay.classList.remove('open'); dim(document.getElementById('svg2'), null); }
});

/* ── OPTION 3 LOGIC ── */
let svg3Built = false;
const v3drawer = document.getElementById('v3-drawer');

function buildOpt3() {
  if (svg3Built) return;
  svg3Built = true;
  buildBike(document.getElementById('svg3'), id => {
    if (!id) { v3drawer.classList.remove('open'); dim(document.getElementById('svg3'), null); return; }
    const d = PARTS[id];
    dim(document.getElementById('svg3'), id);
    setBadge(document.getElementById('v3-badge'), d);
    document.getElementById('v3-name').textContent = d.name;
    document.getElementById('v3-en').textContent = d.en;
    document.getElementById('v3-fn').textContent = d.fn;
    document.getElementById('v3-mat').textContent = d.mat;
    document.getElementById('v3-fact').textContent = d.fact;
    v3drawer.classList.add('open');
  }, false); // light mode labels
}

document.getElementById('v3-close').addEventListener('click', () => {
  v3drawer.classList.remove('open');
  dim(document.getElementById('svg3'), null);
});

/* ── TAB SWITCHING ── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.v;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.view').forEach(view => {
      const isActive = view.id === `view-${v}`;
      view.classList.toggle('active', isActive);
    });

    if (v === '2') buildOpt2();
    if (v === '3') buildOpt3();
    else v3drawer.classList.remove('open');

    // Close opt2 overlay when leaving
    if (v !== '2') { v2overlay.classList.remove('open'); }
  });
});
</script>
