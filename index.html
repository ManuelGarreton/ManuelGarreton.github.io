<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomía de la Bicicleta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2EC;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.10);
    --text-primary: #1A1A18;
    --text-secondary: #5A5A56;
    --text-muted: #9A9A94;
    --accent: #1A1A18;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 1.5rem 2rem 1.25rem;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.25rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }

  header p {
    font-size: 0.8125rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .hint {
    text-align: center;
    font-size: 0.8125rem;
    color: var(--text-muted);
    padding: 0.875rem 1rem;
    letter-spacing: 0.02em;
  }

  main {
    flex: 1;
    padding: 1rem 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .layout {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  #bsvg {
    flex: 3;
    min-width: 280px;
    width: 100%;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: #FAFAF7;
    cursor: pointer;
    display: block;
  }

  .part { cursor: pointer; transition: opacity 0.18s ease; }
  .part:hover { opacity: 0.72; }

  /* INFO PANEL */
  .panel {
    flex: 1.3;
    min-width: 200px;
    max-width: 260px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panel-empty {
    padding: 2.5rem 1.25rem;
    text-align: center;
  }

  .panel-empty .icon {
    width: 44px;
    height: 44px;
    margin: 0 auto 1rem;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .panel-empty p {
    font-size: 0.8125rem;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .panel-content {
    display: none;
  }

  .panel-header {
    padding: 1.25rem 1.25rem 1rem;
    border-bottom: 0.5px solid var(--border);
  }

  .panel-badge {
    display: inline-block;
    font-size: 0.625rem;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    margin-bottom: 0.625rem;
    font-weight: 500;
  }

  .panel-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    margin-bottom: 2px;
    line-height: 1.2;
  }

  .panel-header .subtitle {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-style: italic;
  }

  .panel-body {
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.875rem;
  }

  .field-label {
    font-size: 0.625rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 3px;
  }

  .field-value {
    font-size: 0.8125rem;
    color: var(--text-primary);
    line-height: 1.55;
  }

  .panel-fact {
    margin: 0 1.25rem 1.25rem;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 0.75rem 0.875rem;
  }

  .panel-fact .field-value {
    font-size: 0.75rem;
    color: var(--text-secondary);
  }

  /* COUNT BADGE */
  .count-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding: 0 0 0.25rem;
  }

  .count-chip {
    font-size: 0.6875rem;
    padding: 4px 10px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    color: var(--text-muted);
    background: var(--surface);
    cursor: default;
    transition: all 0.15s;
  }

  .count-chip.active {
    background: var(--text-primary);
    color: white;
    border-color: var(--text-primary);
  }

  footer {
    text-align: center;
    padding: 1rem;
    font-size: 0.6875rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    border-top: 0.5px solid var(--border);
    background: var(--surface);
  }

  @media (max-width: 600px) {
    main { padding: 0.75rem; }
    .layout { flex-direction: column; }
    .panel { max-width: 100%; width: 100%; }
    header { padding: 1rem 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Anatomía de la Bicicleta</h1>
  <p>Exposición interactiva · 15 componentes</p>
</header>

<p class="hint">Toca o haz clic en cualquier pieza para conocerla</p>

<main>
  <div class="layout">

    <svg id="bsvg" viewBox="0 0 620 505" xmlns="http://www.w3.org/2000/svg"></svg>

    <div class="panel">
      <div class="panel-empty" id="panel-empty">
        <div class="icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 16v-4M12 8h.01"/>
          </svg>
        </div>
        <p>Selecciona una pieza de la bicicleta para ver su nombre, función y más.</p>
      </div>

      <div class="panel-content" id="panel-content">
        <div class="panel-header">
          <span class="panel-badge" id="p-badge"></span>
          <h2 id="p-name"></h2>
          <p class="subtitle" id="p-en"></p>
        </div>
        <div class="panel-body">
          <div>
            <p class="field-label">Función</p>
            <p class="field-value" id="p-fn"></p>
          </div>
          <div>
            <p class="field-label">Material típico</p>
            <p class="field-value" id="p-mat"></p>
          </div>
        </div>
        <div class="panel-fact">
          <p class="field-label">Dato curioso</p>
          <p class="field-value" id="p-fact"></p>
        </div>
      </div>
    </div>

  </div>
</main>

<footer>Haz clic en el área vacía del diagrama para deseleccionar</footer>

const svg = document.getElementById('bsvg');
const NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function lbl(x, y, text, fill, size = 9, anchor = 'middle') {
  const t = el('text', { x, y, 'text-anchor': anchor, 'font-size': size, fill, 'pointer-events': 'none', 'font-family': 'DM Sans, sans-serif' });
  t.textContent = text;
  return t;
}

function part(id) {
  const g = el('g', { class: 'part', 'data-id': id });
  return g;
}

// ── WHEELS ──
function makeWheel(cx, cy, r, id) {
  const g = part(id);
  g.append(el('circle', { cx, cy, r: r - 5, fill: PARTS[id].bg, opacity: .5 }));
  g.append(el('circle', { cx, cy, r, fill: 'none', stroke: PARTS[id].c, 'stroke-width': 8 }));
  g.append(el('circle', { cx, cy, r: r - 12, fill: 'none', stroke: PARTS[id].c, 'stroke-width': 1.5, opacity: .6 }));
  g.append(el('circle', { cx, cy, r: 7, fill: PARTS[id].c }));
  for (let i = 0; i < 12; i++) {
    const a = i * 30 * Math.PI / 180;
    g.append(el('line', { x1: cx + Math.cos(a) * 8, y1: cy + Math.sin(a) * 8, x2: cx + Math.cos(a) * (r - 13), y2: cy + Math.sin(a) * (r - 13), stroke: PARTS[id].c, 'stroke-width': 1.2, opacity: .42 }));
  }
  g.append(lbl(cx, cy + r + 14, PARTS[id].name, PARTS[id].tc));
  return g;
}
svg.append(makeWheel(90, 388, 68, 'rueda-del'));

// ── INTERACTION ──
let selected = null;

function selectPart(id) {
  const d = PARTS[id];
  if (!d) return;
  selected = id;

  document.querySelectorAll('.part').forEach(p => {
    p.style.opacity = p.getAttribute('data-id') === id ? '1' : '0.22';
  });

  document.getElementById('panel-empty').style.display = 'none';
  const pc = document.getElementById('panel-content');
  pc.style.display = 'block';

  const badge = document.getElementById('p-badge');
  badge.textContent = 'Pieza ' + d.num;
  badge.style.cssText = `font-size:0.625rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:0.625rem;font-weight:500;background:${d.bg};color:${d.tc};border:0.5px solid ${d.c}`;

  document.getElementById('p-name').textContent = d.name;
  document.getElementById('p-en').textContent = d.en;
  document.getElementById('p-fn').textContent = d.fn;
  document.getElementById('p-mat').textContent = d.mat;
  document.getElementById('p-fact').textContent = d.fact;

  // Smooth scroll to panel on mobile
  if (window.innerWidth < 600) {
    document.querySelector('.panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function deselect() {
  selected = null;
  document.querySelectorAll('.part').forEach(p => p.style.opacity = '1');
  document.getElementById('panel-empty').style.display = '';
  document.getElementById('panel-content').style.display = 'none';
}

document.querySelectorAll('.part').forEach(g => {
  g.addEventListener('click', e => {
    e.stopPropagation();
    const id = g.getAttribute('data-id');
    if (selected === id) { deselect(); return; }
    selectPart(id);
  });
  // Touch support
  g.addEventListener('touchstart', e => {
    e.preventDefault();
    const id = g.getAttribute('data-id');
    if (selected === id) { deselect(); return; }
    selectPart(id);
  }, { passive: false });
});

svg.addEventListener('click', e => {
  if (!e.target.closest('.part')) deselect();
});
</script>
